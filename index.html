<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator PPN 12% & PPh 22</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
        }
        .result p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator PPN 12% & PPh 22</h2>

    <label>Nilai Belanja Yang Kena Pajak</label>
    <input type="number" id="dpp" placeholder="Masukkan nilai DPP">

    <label>Tarif PPh 22 (%)</label>
    <input type="number" id="pph22Rate" placeholder="Contoh: 1.5">

    <button onclick="hitungPajak()">Hitung Pajak</button>

    <div class="result" id="hasil" style="display:none;">
        <p><strong>PPN 12%:</strong> Rp <span id="ppn"></span></p>
        <p><strong>PPh 22:</strong> Rp <span id="pph22"></span></p>
        <p><strong>Total Bayar:</strong> Rp <span id="total"></span></p>
    </div>
</div>

<script>
function formatRupiah(angka) {
    return angka.toLocaleString("id-ID");
}

function hitungPajak() {
    let nilaiBelanja = parseFloat(document.getElementById("dpp").value);
    let pph22Rate = parseFloat(document.getElementById("pph22Rate").value);

    if (isNaN(nilaiBelanja) || isNaN(pph22Rate)) {
        alert("Harap isi semua field dengan benar.");
        return;
    }

    // Rumus PPN sesuai instruksi
    let dpp = nilaiBelanja * (100/111);
    let dppPenyesuaian = dpp * (11/12);
    let ppn = dppPenyesuaian * 0.12;

    let pph22 = nilaiBelanja * (pph22Rate / 100);
    let total = nilaiBelanja + pph22; // karena PPN sudah termasuk dalam nilai belanja

    document.getElementById("ppn").innerText = formatRupiah(ppn);
    document.getElementById("pph22").innerText = formatRupiah(pph22);
    document.getElementById("total").innerText = formatRupiah(total);

    document.getElementById("hasil").style.display = "block";
}
</script>

</body>
</html>

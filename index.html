<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator PPN 12% & PPh 22</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.card {
    background: white;
    width: 100%;
    max-width: 420px;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease-in-out;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2a5298;
}

label {
    font-weight: 600;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0 18px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
    transition: 0.3s;
}

input:focus {
    border-color: #2a5298;
    outline: none;
    box-shadow: 0 0 5px rgba(42,82,152,0.3);
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: 0.3s;
}

.btn-primary {
    background: #2a5298;
    color: white;
}

.btn-primary:hover {
    background: #1e3c72;
}

.btn-secondary {
    background: #e0e0e0;
}

.btn-secondary:hover {
    background: #c6c6c6;
}

.result {
    margin-top: 20px;
    background: #f4f6fb;
    padding: 15px;
    border-radius: 15px;
    display: none;
}

.result p {
    margin: 8px 0;
    font-size: 14px;
}

.result strong {
    float: right;
}

.footer {
    text-align: center;
    font-size: 12px;
    margin-top: 15px;
    color: #777;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Mobile optimization */
@media (max-width: 480px) {
    .card {
        padding: 20px;
    }
}
</style>
</head>
<body>

<div class="card">
    <h2>Kalkulator Pajak</h2>

    <label>Nilai Belanja </label>
    <input type="text" id="nilaiBelanja" placeholder="Contoh: 11.100.000">

    <button class="btn-primary" onclick="hitungPajak()">Hitung Pajak</button>
    <button class="btn-secondary" onclick="resetForm()">Reset</button>

    <div class="result" id="hasil">
        <p>DPP (100/111) <strong>Rp <span id="dpp"></span></strong></p>
        <p>PPN <strong>Rp <span id="ppn"></span></strong></p>
        <p>PPh 22 (1,5%) <strong>Rp <span id="pph22"></span></strong></p>
        
        
    </div>

    <div class="footer">
        © 2026 Kalkulator Pajak
    </div>
</div>

<script>
const inputBelanja = document.getElementById("nilaiBelanja");

inputBelanja.addEventListener("input", function() {
    let value = this.value.replace(/\D/g, "");
    this.value = new Intl.NumberFormat("id-ID").format(value);
});

function getNumericValue(value) {
    return parseFloat(value.replace(/\./g, ""));
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(Math.round(angka));
}

function hitungPajak() {
    let nilaiBelanja = getNumericValue(inputBelanja.value);

    if (isNaN(nilaiBelanja) || nilaiBelanja <= 0) {
        alert("Masukkan nilai belanja yang valid.");
        return;
    }

    let dpp = nilaiBelanja * (100/111);

    let dppPenyesuaian = dpp * (11/12);
    let ppn = dppPenyesuaian * 0.12;

    let pph22 = dpp * 0.015;

    let total = nilaiBelanja + pph22 + ppn;

    document.getElementById("dpp").innerText = formatRupiah(dpp);
    document.getElementById("ppn").innerText = formatRupiah(ppn);
    document.getElementById("pph22").innerText = formatRupiah(pph22);
    document.getElementById("total").innerText = formatRupiah(total);

    document.getElementById("hasil").style.display = "block";
}

function resetForm() {
    inputBelanja.value = "";
    document.getElementById("hasil").style.display = "none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator PPN 12% & PPh 22</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator PPN 12% & PPh 22</h2>

    <label>Nilai Belanja (Sudah termasuk PPN 11%)</label>
    <input type="text" id="nilaiBelanja" placeholder="Masukkan nilai belanja">

    <button onclick="hitungPajak()">Hitung Pajak</button>

    <div class="result" id="hasil">
        <p><strong>DPP (100/111):</strong> Rp <span id="dpp"></span></p>
        <p><strong>PPN 12%:</strong> Rp <span id="ppn"></span></p>
        <p><strong>PPh 22 (1,5%):</strong> Rp <span id="pph22"></span></p>
        <p><strong>Total Bayar + PPh22:</strong> Rp <span id="total"></span></p>
    </div>
</div>

<script>
const inputBelanja = document.getElementById("nilaiBelanja");

// Format otomatis titik ribuan saat mengetik
inputBelanja.addEventListener("input", function(e) {
    let value = this.value.replace(/\D/g, "");
    this.value = new Intl.NumberFormat("id-ID").format(value);
});

function getNumericValue(value) {
    return parseFloat(value.replace(/\./g, ""));
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(Math.round(angka));
}

function hitungPajak() {
    let nilaiBelanja = getNumericValue(inputBelanja.value);

    if (isNaN(nilaiBelanja) || nilaiBelanja <= 0) {
        alert("Masukkan nilai belanja yang valid.");
        return;
    }

    // DPP
    let dpp = nilaiBelanja * (100/111);

    // PPN sesuai rumus sebelumnya
    let dppPenyesuaian = dpp * (11/12);
    let ppn = dppPenyesuaian * 0.12;

    // PPh 22 sesuai instruksi baru
    let pph22 = dpp * 0.015;

    let total = nilaiBelanja + pph22;

    document.getElementById("dpp").innerText = formatRupiah(dpp);
    document.getElementById("ppn").innerText = formatRupiah(ppn);
    document.getElementById("pph22").innerText = formatRupiah(pph22);
    document.getElementById("total").innerText = formatRupiah(total);

    document.getElementById("hasil").style.display = "block";
}
</script>

</body>
</html>
